{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <div class="container my-4 position-relative">
    <h1 class="text-center">Tags</h1>
    <a href="{% url 'tasks:tag-create' %}" class="btn btn-primary position-absolute" style="right: 225px; top: 25px;">
      Create
    </a>

  <div class="row">
    <div class="col-md-8 offset-md-2">
      <div class="card my-3 shadow-sm">
        <div class="card-body">
          {% if tag_list %}
            <table class="table">
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Update</th>
                <th>Delete</th>
              </tr>
              {% for tag in tag_list %}
                <tr>
                  <td>{{ tag.id }}</td>
                  <td>{{ tag.name }}</td>
                  <td>
                    <a href="{% url 'tasks:tag-update' pk=tag.id %}" class="btn btn-secondary">
                      Update
                    </a>
                  </td>
                  <td>
                    <a href="{% url 'tasks:tag-delete' pk=tag.id %}" class="btn btn-danger">
                      Delete
                    </a>
                  </td>
                </tr>
              {% endfor %}
            </table>
          {% else %}
            <p>No tags available yet. Add a new tag</p>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
{% endblock %}
